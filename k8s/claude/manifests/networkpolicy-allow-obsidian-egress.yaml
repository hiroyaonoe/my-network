apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-obsidian-egress
  namespace: claude
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: obsidian
          podSelector:
            matchLabels:
              app.kubernetes.io/name: obsidian
      ports:
        - protocol: TCP
          port: 3443
        - protocol: TCP
          port: 3001
