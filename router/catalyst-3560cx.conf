! Catalyst WS-C3560CX-8PC-S Configuration
! VM基盤ローカルルータ / L3スイッチ

hostname local-router

ip routing

ip name-server 10.0.0.1
ntp server 10.0.0.1

!
! VLAN定義
!
vlan 10
 name mgmt
vlan 20
 name ceph

! 初期VM用VLAN (採番ルールに従い追加可能)
vlan 100
 name vm-bastion
vlan 101
 name vm-lab
vlan 102
 name vm-k8s
vlan 103
 name vm-ai

!
! SVI (VLAN Interface / ゲートウェイ)
!
interface Vlan10
 ip address 10.1.1.1 255.255.255.0
 no shutdown

interface Vlan20
 ip address 10.1.2.1 255.255.255.0
 no shutdown

! 初期VM用SVI (採番ルール: VLAN 100+N → 10.2.(N/8).(N%8*32)/27)
interface Vlan100
 ip address 10.2.0.1 255.255.255.224
 no shutdown

interface Vlan101
 ip address 10.2.0.33 255.255.255.224
 no shutdown

interface Vlan102
 ip address 10.2.0.65 255.255.255.224
 no shutdown

interface Vlan103
 ip address 10.2.0.97 255.255.255.224
 no shutdown

!
! 物理ポート設定
!
! WAN側ルータ接続 (Routed Port)
interface GigabitEthernet0/1
 no switchport
 ip address 10.0.1.1 255.255.255.0
 no shutdown

! 緊急時管理用ポート (トラブルシューティング用)
interface GigabitEthernet0/2
 description Emergency Management Access
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast
 no shutdown

! mandolin1 LACP
interface GigabitEthernet0/3
 switchport mode trunk
 switchport trunk native vlan 10
 switchport trunk allowed vlan 10,20,100-227
 channel-group 1 mode active
 no shutdown

interface GigabitEthernet0/4
 switchport mode trunk
 switchport trunk native vlan 10
 switchport trunk allowed vlan 10,20,100-227
 channel-group 1 mode active
 no shutdown

! mandolin2 LACP
interface GigabitEthernet0/5
 switchport mode trunk
 switchport trunk native vlan 10
 switchport trunk allowed vlan 10,20,100-227
 channel-group 2 mode active
 no shutdown

interface GigabitEthernet0/6
 switchport mode trunk
 switchport trunk native vlan 10
 switchport trunk allowed vlan 10,20,100-227
 channel-group 2 mode active
 no shutdown

! mandolin3 LACP
interface GigabitEthernet0/7
 switchport mode trunk
 switchport trunk native vlan 10
 switchport trunk allowed vlan 10,20,100-227
 channel-group 3 mode active
 no shutdown

interface GigabitEthernet0/8
 switchport mode trunk
 switchport trunk native vlan 10
 switchport trunk allowed vlan 10,20,100-227
 channel-group 3 mode active
 no shutdown

!
! Port-Channel設定
!
interface Port-channel1
 switchport mode trunk
 switchport trunk native vlan 10
 switchport trunk allowed vlan 10,20,100-227

interface Port-channel2
 switchport mode trunk
 switchport trunk native vlan 10
 switchport trunk allowed vlan 10,20,100-227

interface Port-channel3
 switchport mode trunk
 switchport trunk native vlan 10
 switchport trunk allowed vlan 10,20,100-227

!
! ルーティング
!
ip route 0.0.0.0 0.0.0.0 10.0.0.1

end
