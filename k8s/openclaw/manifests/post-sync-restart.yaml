apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-restart
  namespace: openclaw
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openclaw-restart
  namespace: openclaw
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    resourceNames: ["openclaw"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openclaw-restart
  namespace: openclaw
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
subjects:
  - kind: ServiceAccount
    name: openclaw-restart
    namespace: openclaw
roleRef:
  kind: Role
  name: openclaw-restart
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: openclaw-restart
  namespace: openclaw
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 60
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: openclaw-restart
      containers:
        - name: restart
          image: bitnami/kubectl:1.32
          command:
            - kubectl
            - rollout
            - restart
            - statefulset/openclaw
            - -n
            - openclaw
