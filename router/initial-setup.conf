! Catalyst 3560-CX 初期セットアップ (SSH接続可能にする最小設定)
! コンソールケーブルで接続して、この設定を投入する

! ホスト名
hostname local-router

! 管理VLAN作成
vlan 10
 name mgmt
exit

! 管理用SVI (ゲートウェイ)
interface Vlan10
 ip address 10.1.1.1 255.255.255.0
 no shutdown
exit

! 一時的な管理用ポート (Gi0/2を使用)
! PCをGi0/2に接続して10.1.1.0/24のIPを設定すればアクセス可能
interface GigabitEthernet0/2
 switchport mode access
 switchport access vlan 10
 no shutdown
 spanning-tree portfast
exit

! ルーティング有効化
ip routing

! ローカルユーザー作成 (ユーザー名: admin)
! パスワードは実行時に設定してください
username admin privilege 15 secret <strong-password>

! Enable パスワード
enable secret <strong-password>

! SSH設定
ip domain-name internal.onoe.dev
crypto key generate rsa modulus 2048

! SSH v2のみ許可
ip ssh version 2
ip ssh time-out 60
ip ssh authentication-retries 3

! VTY (SSH) 設定
line vty 0 15
 login local
 transport input ssh
 exec-timeout 15 0
exit

! コンソール設定
line console 0
 login local
 exec-timeout 15 0
exit

! 設定保存
end
copy running-config startup-config
