# /etc/ceph/ceph.conf
# Ceph設定 (参考値)
# 実際の設定はProxmox Web UIまたはpvecephコマンドで行う

[global]
    cluster_network = 10.1.2.0/24
    public_network = 10.1.1.0/24

    # 3ノード構成
    mon_host = 10.1.1.11,10.1.1.12,10.1.1.13

    # OSDメモリ設定 (16GB RAMの制約を考慮)
    osd_memory_target = 2147483648  # 2GB

[mon]
    mon_allow_pool_delete = false

[osd]
    # レプリケーション設定
    osd_pool_default_size = 3
    osd_pool_default_min_size = 2
