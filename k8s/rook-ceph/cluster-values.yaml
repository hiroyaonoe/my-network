# Rook Ceph Cluster - External Mode
# Connects to Proxmox Ceph cluster (monitors: 10.1.1.11-13)

operatorNamespace: rook-ceph

cephClusterSpec:
  external:
    enable: true
  crashCollector:
    disable: true
  healthCheck:
    daemonHealth:
      mon:
        disabled: false
        interval: 45s

# CephBlockPool is managed on Proxmox side (external cluster)
# Do not create CephBlockPool CR to avoid EACCES on CRUSH rule operations
cephBlockPools: []

cephFileSystems: []
cephObjectStores: []

monitoring:
  enabled: false
