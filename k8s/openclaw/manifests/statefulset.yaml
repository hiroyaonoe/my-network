apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: openclaw
  labels:
    app.kubernetes.io/name: openclaw
spec:
  clusterIP: None
  ports:
    - port: 18789
      targetPort: gateway
      name: gateway
  selector:
    app.kubernetes.io/name: openclaw
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: openclaw
  namespace: openclaw
  labels:
    app.kubernetes.io/name: openclaw
spec:
  serviceName: openclaw
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          ports:
            - name: gateway
              containerPort: 18789
          env:
            - name: OPENCLAW_CONFIG_PATH
              value: /config/openclaw.json
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: SLACK_APP_TOKEN
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: SLACK_BOT_TOKEN
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: LLM_API_KEY
            - name: GATEWAY_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: GATEWAY_AUTH_TOKEN
          volumeMounts:
            - name: data
              mountPath: /home/node/.openclaw
            - name: config
              mountPath: /config
              readOnly: true
            - name: config
              mountPath: /home/node/.openclaw/exec-approvals.json
              subPath: exec-approvals.json
              readOnly: true
            - name: tls
              mountPath: /tls
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 16Gi
          startupProbe:
            httpGet:
              path: /healthz
              port: gateway
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: gateway
          livenessProbe:
            httpGet:
              path: /healthz
              port: gateway
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: config
          configMap:
            name: openclaw-config
        - name: tls
          secret:
            secretName: openclaw-server-tls
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: ceph-block
        resources:
          requests:
            storage: 32Gi
