apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-internal-onoe-dev
  namespace: cert-manager
spec:
  secretName: wildcard-internal-onoe-dev-tls
  duration: 2160h # 90 days
  renewBefore: 720h # 30 days
  dnsNames:
    - "*.internal.onoe.dev"
    - internal.onoe.dev
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
    group: cert-manager.io
