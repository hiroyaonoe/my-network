apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-obsidian-egress
  namespace: claude
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.5.0.5/32
      ports:
        - protocol: TCP
          port: 3443
        - protocol: TCP
          port: 3001
