apiVersion: batch/v1
kind: CronJob
metadata:
  name: reboot-k8s-worker-02
  namespace: node-reboot
spec:
  schedule: "0 15 * * *"
  timeZone: "Asia/Tokyo"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 600
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: reboot
              image: ghcr.io/siderolabs/talosctl:v1.12.4
              command:
                - talosctl
                - --talosconfig=/var/run/secrets/talosconfig/talosconfig
                - --endpoints=10.2.0.70
                - --nodes=10.2.0.70
                - reboot
              volumeMounts:
                - name: talosconfig
                  mountPath: /var/run/secrets/talosconfig
                  readOnly: true
          volumes:
            - name: talosconfig
              secret:
                secretName: talosconfig
