server:
  ha:
    enabled: true
    # Standalone mode: 1 replica (reduced from 3 for resource constraints)
    # To restore HA: set replicas: 3, add retry_join for vault-1/2, restore affinity
    # See k8s/docs/node-scaling.md for details
    replicas: 1
    raft:
      enabled: true
      config: |
        ui = true

        listener "tcp" {
          tls_disable    = 0
          address        = "[::]:8200"
          cluster_address = "[::]:8201"
          tls_cert_file  = "/vault/tls/tls.crt"
          tls_key_file   = "/vault/tls/tls.key"
          tls_client_ca_file = "/vault/tls/ca.crt"
        }

        storage "raft" {
          path = "/vault/data"

          retry_join {
            leader_api_addr = "https://vault-0.vault-internal:8200"
            leader_ca_cert_file = "/vault/tls/ca.crt"
            leader_tls_servername = "vault.vault.svc"
          }
          # To restore HA: uncomment retry_join blocks for vault-1 and vault-2
          # retry_join {
          #   leader_api_addr = "https://vault-1.vault-internal:8200"
          #   leader_ca_cert_file = "/vault/tls/ca.crt"
          #   leader_tls_servername = "vault.vault.svc"
          # }
          # retry_join {
          #   leader_api_addr = "https://vault-2.vault-internal:8200"
          #   leader_ca_cert_file = "/vault/tls/ca.crt"
          #   leader_tls_servername = "vault.vault.svc"
          # }
        }

        service_registration "kubernetes" {}

  service:
    type: LoadBalancer
    port: 443
    targetPort: 8200
    loadBalancerIP: "10.5.0.3"
    annotations:
      external-dns.alpha.kubernetes.io/hostname: vault.internal.onoe.dev
    active:
      enabled: false
    standby:
      enabled: false

  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: ceph-block

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  volumes:
    - name: tls
      secret:
        secretName: vault-server-tls
    - name: unseal-keys
      secret:
        secretName: vault-unseal-keys
        optional: true
    - name: root-token
      secret:
        secretName: vault-root-token
        optional: true

  volumeMounts:
    - name: tls
      mountPath: /vault/tls
      readOnly: true
    - name: unseal-keys
      mountPath: /vault/unseal-keys
      readOnly: true
    - name: root-token
      mountPath: /vault/root-token
      readOnly: true

  postStart:
    - /bin/sh
    - -c
    - |
      (
        sleep 10
        if [ -f /vault/unseal-keys/key-0 ]; then
          vault operator unseal "$(cat /vault/unseal-keys/key-0)" 2>/dev/null || true
          vault operator unseal "$(cat /vault/unseal-keys/key-1)" 2>/dev/null || true
        fi
      ) &

  extraEnvironmentVars:
    VAULT_CACERT: /vault/tls/ca.crt
    VAULT_ADDR: https://127.0.0.1:8200
    VAULT_API_ADDR: https://$(HOSTNAME).vault-internal:8200
    VAULT_CLUSTER_ADDR: https://$(HOSTNAME).vault-internal:8201

  # To restore HA: uncomment affinity block below
  # affinity: |
  #   podAntiAffinity:
  #     requiredDuringSchedulingIgnoredDuringExecution:
  #       - labelSelector:
  #           matchLabels:
  #             app.kubernetes.io/name: {{ template "vault.name" . }}
  #             component: server
  #         topologyKey: kubernetes.io/hostname

ui:
  enabled: true

injector:
  enabled: false

csi:
  enabled: false
