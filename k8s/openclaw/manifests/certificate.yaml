apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: openclaw-server-tls
  namespace: openclaw
spec:
  secretName: openclaw-server-tls
  duration: 2160h # 90 days
  renewBefore: 720h # 30 days
  dnsNames:
    - openclaw.internal.onoe.dev
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
    group: cert-manager.io
