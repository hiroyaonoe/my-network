# Cilium Helm values for K8s cluster on VLAN 102

# Talos Linux 固有設定
# Talos は CAP_SYS_MODULE, CAP_SYS_BOOT を制限するため、明示的に capabilities を指定
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

# ルーティング
routingMode: native
autoDirectNodeRoutes: true
ipv4NativeRoutingCIDR: "10.3.0.0/16"
enableIPv4Masquerade: true

# kube-proxy 代替
kubeProxyReplacement: true
k8sServiceHost: "10.2.0.94"
k8sServicePort: 6443

# IPAM
ipam:
  mode: kubernetes

# L2 Announcement (LB VIP 用)
l2announcements:
  enabled: true

# ExternalIPs
externalIPs:
  enabled: true

# API rate limit (L2 announcement が Lease を頻繁に更新するため)
k8sClientRateLimit:
  qps: 50
  burst: 100

# Operator
operator:
  replicas: 1
