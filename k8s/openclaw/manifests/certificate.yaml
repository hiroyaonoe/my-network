apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: openclaw-server-tls
  namespace: openclaw
spec:
  secretName: openclaw-server-tls
  duration: 8760h # 1 year
  renewBefore: 720h # 30 days
  dnsNames:
    - openclaw.internal.onoe.dev
    - openclaw.openclaw.svc.cluster.local
  issuerRef:
    name: internal-ca
    kind: ClusterIssuer
    group: cert-manager.io
