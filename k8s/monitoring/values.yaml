# --- Grafana ---
grafana:
  dashboards:
    kubernetes:
      k8s-views-global:
        gnetId: 15757
        revision: 1
        datasource: Prometheus
      k8s-views-namespaces:
        gnetId: 15758
        revision: 1
        datasource: Prometheus
      k8s-views-nodes:
        gnetId: 15759
        revision: 1
        datasource: Prometheus
      k8s-views-pods:
        gnetId: 15760
        revision: 1
        datasource: Prometheus
    argocd:
      argocd-operational:
        gnetId: 19993
        revision: 1
        datasource: Prometheus
      argocd-application:
        gnetId: 19974
        revision: 1
        datasource: Prometheus
    proxmox:
      proxmox-cluster:
        gnetId: 10347
        revision: 1
        datasource: Prometheus
    ceph:
      ceph-cluster:
        gnetId: 7056
        revision: 1
        datasource: Prometheus
    infrastructure:
      node-exporter-full:
        gnetId: 1860
        revision: 1
        datasource: Prometheus

  service:
    type: LoadBalancer
    loadBalancerIP: "10.5.0.2"
    port: 443
    targetPort: 3000
    annotations:
      external-dns.alpha.kubernetes.io/hostname: grafana.internal.onoe.dev

  extraSecretMounts:
    - name: grafana-server-tls
      secretName: grafana-server-tls
      defaultMode: 0440
      mountPath: /etc/grafana/tls
      readOnly: true

  grafana.ini:
    server:
      protocol: https
      cert_file: /etc/grafana/tls/tls.crt
      cert_key: /etc/grafana/tls/tls.key
      root_url: https://grafana.internal.onoe.dev

  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki-gateway.loki.svc.cluster.local:80
      access: proxy
    - name: Tempo
      type: tempo
      uid: tempo
      url: http://tempo.tempo.svc.cluster.local:3100
      access: proxy
      jsonData:
        tracesToLogsV2:
          datasourceUid: loki
          filterByTraceID: true
        serviceMap:
          datasourceUid: prometheus
        nodeGraph:
          enabled: true

  persistence:
    enabled: true
    storageClassName: ceph-block
    size: 10Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

# --- Prometheus ---
prometheus:
  prometheusSpec:
    retention: 30d
    retentionSize: "45GB"
    walCompression: true
    enableRemoteWriteReceiver: true
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: ceph-block
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        memory: 2Gi

    additionalScrapeConfigs:
      - job_name: ceph
        honor_labels: true
        scrape_interval: 30s
        static_configs:
          - targets:
              - "10.1.1.11:9283"
              - "10.1.1.12:9283"
              - "10.1.1.13:9283"
            labels:
              cluster: mandolin
      - job_name: pve
        static_configs:
          - targets:
              - "10.1.1.11"
              - "10.1.1.12"
              - "10.1.1.13"
            labels:
              cluster: mandolin
        metrics_path: /pve
        params:
          cluster: ["1"]
          node: ["1"]
        relabel_configs:
          - source_labels: [__address__]
            target_label: __param_target
          - source_labels: [__param_target]
            target_label: instance
          - target_label: __address__
            replacement: pve-exporter.monitoring.svc.cluster.local:9221

# --- Alertmanager ---
alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: ceph-block
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 256Mi
    secrets:
      - alertmanager-slack-webhook

  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ["namespace", "alertname"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: slack
      routes:
        - receiver: "null"
          matchers:
            - alertname = "Watchdog"
    receivers:
      - name: "null"
      - name: slack
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/url
            channel: "#alerts"
            send_resolved: true
            title: |-
              [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
            text: >-
              {{ range .Alerts }}
              *Severity:* {{ .Labels.severity }}
              *Namespace:* {{ .Labels.namespace }}
              *Summary:* {{ .Annotations.summary }}
              {{ end }}

# --- Node Exporter ---
nodeExporter:
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      memory: 64Mi

# --- kube-state-metrics ---
kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi

# --- Prometheus Operator ---
prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
