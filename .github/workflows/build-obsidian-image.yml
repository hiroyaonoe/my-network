name: Build obsidian Image

on:
  push:
    branches: [main]
    paths:
      - "k8s/images/obsidian/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: hiroyaonoe/obsidian

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: k8s/images/obsidian
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update StatefulSet image tag
        env:
          META_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          SHA_IMAGE="$(echo "${META_TAGS}" | tr ',' '\n' | grep 'sha-' | tr -d ' ' | head -n1)"
          SHORT_TAG="${SHA_IMAGE##*:}"
          sed -i "s|image: ghcr.io/hiroyaonoe/obsidian:.*|image: ${SHA_IMAGE}|" k8s/obsidian/manifests/statefulset.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/obsidian/manifests/statefulset.yaml
          git diff --cached --quiet || (git commit -m "Update obsidian image to ${SHORT_TAG}" && git push)
