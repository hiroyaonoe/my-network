apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-server-tls
  namespace: monitoring
spec:
  secretName: grafana-server-tls
  duration: 2160h # 90 days
  renewBefore: 720h # 30 days
  dnsNames:
    - grafana.internal.onoe.dev
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
    group: cert-manager.io
