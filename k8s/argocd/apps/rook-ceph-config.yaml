apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rook-ceph-config
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/hiroyaonoe/my-network.git
    targetRevision: main
    path: k8s/rook-ceph/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: rook-ceph
  syncPolicy:
    syncOptions:
      - Replace=true
    automated:
      prune: true
      selfHeal: true
