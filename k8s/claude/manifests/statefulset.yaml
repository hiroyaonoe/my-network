apiVersion: v1
kind: Service
metadata:
  name: claude
  namespace: claude
  labels:
    app.kubernetes.io/name: claude
spec:
  clusterIP: None
  ports:
    - port: 22
      targetPort: ssh
      name: ssh
  selector:
    app.kubernetes.io/name: claude
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: claude
  namespace: claude
  labels:
    app.kubernetes.io/name: claude
spec:
  serviceName: claude
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: claude
  template:
    metadata:
      labels:
        app.kubernetes.io/name: claude
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: claude
          image: ghcr.io/hiroyaonoe/claude-code:latest
          command: ["/usr/sbin/sshd", "-D", "-e"]
          ports:
            - name: ssh
              containerPort: 22
          volumeMounts:
            - name: data
              mountPath: /root
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 4Gi
          startupProbe:
            tcpSocket:
              port: ssh
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: ssh
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: ssh
            timeoutSeconds: 5
          securityContext:
            runAsUser: 0
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: ceph-block
        resources:
          requests:
            storage: 32Gi
