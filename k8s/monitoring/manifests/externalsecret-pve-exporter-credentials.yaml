apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pve-exporter-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: pve-exporter-credentials
    creationPolicy: Owner
  data:
    - secretKey: user
      remoteRef:
        key: monitoring/pve-exporter-credentials
        property: user
    - secretKey: token_name
      remoteRef:
        key: monitoring/pve-exporter-credentials
        property: token_name
    - secretKey: token_value
      remoteRef:
        key: monitoring/pve-exporter-credentials
        property: token_value
