apiVersion: v1
kind: ConfigMap
metadata:
  name: sshwifty-config
  namespace: sshwifty
  labels:
    app.kubernetes.io/name: sshwifty
data:
  sshwifty.conf.json: |
    {
      "HostName": "bastion.internal.onoe.dev",
      "SharedKey": "",
      "DialTimeout": 10,
      "Servers": [
        {
          "ListenInterface": "0.0.0.0",
          "ListenPort": 8182,
          "InitialTimeout": 10,
          "ReadTimeout": 600,
          "WriteTimeout": 600,
          "HeartbeatTimeout": 300,
          "ReadDelay": 10,
          "WriteDelay": 10,
          "TLSCertificateFile": "/certs/tls.crt",
          "TLSCertificateKeyFile": "/certs/tls.key",
          "ServerMessage": ""
        }
      ],
      "Presets": [
        {
          "Title": "bastion-01",
          "Type": "SSH",
          "Host": "10.2.0.2:22",
          "Meta": {
            "User": "onoe",
            "Encoding": "utf-8",
            "Private Key": "file:///secrets/bastion-ssh-key",
            "Authentication": "Private Key"
          }
        }
      ],
      "OnlyAllowPresetRemotes": true
    }
