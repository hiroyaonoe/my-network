apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: openclaw
data:
  openclaw.json: |
    {
      gateway: {
        port: 18789,
        bind: "lan",
        auth: { token: "${GATEWAY_AUTH_TOKEN}" },
        tls: {
          cert: "/tls/tls.crt",
          key: "/tls/tls.key",
        },
      },
      channels: {
        slack: {
          enabled: true,
          mode: "socket",
          appToken: "${SLACK_APP_TOKEN}",
          botToken: "${SLACK_BOT_TOKEN}",
          dmPolicy: "allowlist",
          allowFrom: [],
        },
      },
      agents: {
        defaults: {
          // --- Model Selection ---
          model: {
            primary: "anthropic/claude-sonnet-4-5",
            fallbacks: ["anthropic/claude-haiku-4-5"],
          },

          // --- Per-Model Tuning ---
          models: {
            "anthropic/claude-opus-4-6": {
              alias: "opus",
              params: {
                maxTokens: 8192,
                cacheRetention: "short",
                cacheControlTtl: "5m",
              },
            },
            "anthropic/claude-sonnet-4-5": {
              alias: "sonnet",
              params: {
                maxTokens: 4096,
                cacheRetention: "short",
                cacheControlTtl: "5m",
              },
            },
            "anthropic/claude-haiku-4-5": {
              alias: "haiku",
              params: {
                maxTokens: 2048,
                cacheRetention: "short",
              },
            },
          },

          // --- Context Limits (stay under 200K to avoid long-context pricing) ---
          contextTokens: 200000,

          // --- Thinking (off/minimal/low/medium/high/xhigh) ---
          thinkingDefault: "low",

          // --- Context Pruning (prevent stale tool results from inflating input tokens) ---
          contextPruning: {
            mode: "cache-ttl",
            ttl: "1h",
            keepLastAssistants: 3,
            softTrim: {
              maxChars: 4000,
              headChars: 1500,
              tailChars: 1500,
            },
            hardClear: {
              enabled: true,
            },
          },

          // --- Compaction ---
          compaction: {
            mode: "safeguard",
            reserveTokensFloor: 24000,
            memoryFlush: {
              enabled: true,
              softThresholdTokens: 40000,
            },
          },

          // --- Bootstrap File Limits (reduce per-message token injection) ---
          bootstrapMaxChars: 15000,
          bootstrapTotalMaxChars: 80000,

          // --- Heartbeat (use cheapest model) ---
          heartbeat: {
            every: "55m",
            model: "anthropic/claude-haiku-4-5",
            includeReasoning: false,
            ackMaxChars: 300,
          },

          // --- Subagents (use cheaper model for simple tasks) ---
          subagents: {
            model: "anthropic/claude-haiku-4-5",
            maxConcurrent: 1,
            archiveAfterMinutes: 60,
          },

          // --- Vision (reduce screenshot token cost) ---
          imageMaxDimensionPx: 800,
        },
      },
    }
