apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: openclaw
data:
  openclaw.json: |
    {
      // ===================
      // Gateway
      // ===================
      gateway: {
        port: 18789,
        bind: "0.0.0.0",
        auth: { token: "${GATEWAY_AUTH_TOKEN}" },
        tls: {
          cert: "/tls/tls.crt",
          key: "/tls/tls.key",
        },
        controlUi: {
          allowedOrigins: ["https://openclaw.internal.onoe.dev"],
          dangerouslyDisableDeviceAuth: true,
        },
      },

      // ===================
      // Channels
      // ===================
      channels: {
        slack: {
          enabled: true,
          mode: "socket",
          appToken: "${SLACK_APP_TOKEN}",
          botToken: "${SLACK_BOT_TOKEN}",
          dmPolicy: "open",
          allowFrom: ["*"],
          replyToMode: "off",
        },
      },

      // ===================
      // Discovery
      // ===================
      discovery: {
        mdns: { mode: "off" },
      },

      // ===================
      // Logging
      // ===================
      logging: {
        consoleStyle: "json",
        consoleLevel: "info",
        redactSensitive: "tools",
      },

      // ===================
      // Tools
      // ===================
      tools: {
        fs: { workspaceOnly: true },
        exec: {
          security: "allowlist",
        },
        loopDetection: {
          enabled: true,
          historySize: 30,
          warningThreshold: 5,
          criticalThreshold: 10,
        },
      },

      // ===================
      // Session
      // ===================
      session: {
        reset: {
          mode: "daily",
          atHour: 4,
        },
        idleMinutes: 120,
        maintenance: {
          pruneAfter: "30d",
          maxEntries: 200,
          maxDiskBytes: "20gb",
          highWaterBytes: "16gb",
        },
      },

      // ===================
      // Messages
      // ===================
      messages: {
        queue: {
          mode: "collect",
          debounceMs: 1500,
          cap: 10,
          drop: "summarize",
        },
      },

      // ===================
      // Models (provider auth)
      // ===================
      models: {
        providers: {
          anthropic: {
            apiKey: "${LLM_API_KEY}",
            baseUrl: "https://api.anthropic.com",
            models: [
              { id: "claude-opus-4-6", name: "Claude Opus 4.6" },
              { id: "claude-sonnet-4-5", name: "Claude Sonnet 4.5" },
              { id: "claude-haiku-4-5", name: "Claude Haiku 4.5" },
            ],
          },
        },
      },

      // ===================
      // Agents
      // ===================
      agents: {
        defaults: {
          // --- Model Selection ---
          model: {
            primary: "anthropic/claude-sonnet-4-5",
            fallbacks: ["anthropic/claude-haiku-4-5"],
          },

          // --- Per-Model Tuning ---
          models: {
            "anthropic/claude-opus-4-6": {
              alias: "opus",
              params: {
                maxTokens: 8192,
                cacheRetention: "short",
                cacheControlTtl: "5m",
              },
            },
            "anthropic/claude-sonnet-4-5": {
              alias: "sonnet",
              params: {
                maxTokens: 4096,
                cacheRetention: "short",
                cacheControlTtl: "5m",
              },
            },
            "anthropic/claude-haiku-4-5": {
              alias: "haiku",
              params: {
                maxTokens: 2048,
                cacheRetention: "short",
              },
            },
          },

          // --- Context Limits (stay under 200K to avoid long-context pricing) ---
          contextTokens: 200000,

          // --- Thinking (off/minimal/low/medium/high/xhigh) ---
          thinkingDefault: "low",

          // --- Timezone ---
          userTimezone: "Asia/Tokyo",
          timeFormat: "24",

          // --- Typing ---
          typingMode: "thinking",

          // --- Context Pruning (prevent stale tool results from inflating input tokens) ---
          contextPruning: {
            mode: "cache-ttl",
            ttl: "1h",
            keepLastAssistants: 3,
            softTrim: {
              maxChars: 4000,
              headChars: 1500,
              tailChars: 1500,
            },
            hardClear: {
              enabled: true,
            },
          },

          // --- Compaction ---
          compaction: {
            mode: "safeguard",
            reserveTokensFloor: 24000,
            memoryFlush: {
              enabled: true,
              softThresholdTokens: 40000,
            },
          },

          // --- Bootstrap File Limits (reduce per-message token injection) ---
          bootstrapMaxChars: 15000,
          bootstrapTotalMaxChars: 80000,

          // --- Heartbeat (use cheapest model, active hours only) ---
          heartbeat: {
            every: "55m",
            model: "anthropic/claude-haiku-4-5",
            includeReasoning: false,
            ackMaxChars: 300,
            activeHours: {
              start: "09:00",
              end: "00:00",
              timezone: "Asia/Tokyo",
            },
          },

          // --- Subagents (use cheaper model for simple tasks) ---
          subagents: {
            model: "anthropic/claude-haiku-4-5",
            maxConcurrent: 1,
            runTimeoutSeconds: 300,
            archiveAfterMinutes: 60,
          },

          // --- Vision (reduce screenshot token cost) ---
          imageMaxDimensionPx: 800,
        },
      },
    }
  exec-approvals.json: |
    {
      "version": 1,
      "defaults": {
        "security": "allowlist",
        "ask": "off",
        "askFallback": "deny"
      },
      "agents": {
        "main": {
          "security": "allowlist",
          "ask": "off",
          "allowlist": [
            {"pattern": "/usr/bin/ls"},
            {"pattern": "/usr/bin/cat"},
            {"pattern": "/usr/bin/head"},
            {"pattern": "/usr/bin/tail"},
            {"pattern": "/usr/bin/wc"},
            {"pattern": "/usr/bin/diff"},
            {"pattern": "/usr/bin/find"},
            {"pattern": "/usr/bin/file"},
            {"pattern": "/usr/bin/stat"},
            {"pattern": "/usr/bin/realpath"},
            {"pattern": "/usr/bin/basename"},
            {"pattern": "/usr/bin/dirname"},
            {"pattern": "/usr/bin/mkdir"},
            {"pattern": "/usr/bin/touch"},
            {"pattern": "/usr/bin/cp"},
            {"pattern": "/usr/bin/mv"},
            {"pattern": "/usr/bin/rm"},
            {"pattern": "/usr/bin/chmod"},
            {"pattern": "/usr/bin/git"},
            {"pattern": "/usr/bin/curl"},
            {"pattern": "/usr/bin/wget"}
          ]
        }
      }
    }
