apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-secrets
  namespace: openclaw
spec:
  refreshInterval: 1h0m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: openclaw-secrets
    creationPolicy: Owner
  data:
    - secretKey: SLACK_APP_TOKEN
      remoteRef:
        key: openclaw/config
        property: slack_app_token
    - secretKey: SLACK_BOT_TOKEN
      remoteRef:
        key: openclaw/config
        property: slack_bot_token
    - secretKey: LLM_API_KEY
      remoteRef:
        key: openclaw/config
        property: llm_api_key
    - secretKey: GATEWAY_AUTH_TOKEN
      remoteRef:
        key: openclaw/config
        property: gateway_auth_token
