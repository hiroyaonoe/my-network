apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium-config
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/hiroyaonoe/my-network.git
    targetRevision: main
    path: k8s/cilium/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
