apiVersion: batch/v1
kind: CronJob
metadata:
  name: reboot-k8s-worker-03
  namespace: node-reboot
spec:
  schedule: "0 19 * * *"
  timeZone: "Asia/Tokyo"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 600
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: reboot
              image: ghcr.io/siderolabs/talosctl:v1.12.4
              command: ["sh", "/scripts/reboot-worker.sh", "10.2.0.71"]
              volumeMounts:
                - name: talosconfig
                  mountPath: /var/run/secrets/talosconfig
                  readOnly: true
                - name: reboot-scripts
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: talosconfig
              secret:
                secretName: talosconfig
            - name: reboot-scripts
              configMap:
                name: reboot-scripts
                defaultMode: 0755
