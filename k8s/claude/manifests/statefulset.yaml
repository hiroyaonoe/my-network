apiVersion: v1
kind: Service
metadata:
  name: claude
  namespace: claude
  labels:
    app.kubernetes.io/name: claude
spec:
  clusterIP: None
  ports:
    - port: 22
      targetPort: ssh
      name: ssh
  selector:
    app.kubernetes.io/name: claude
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: claude
  namespace: claude
  labels:
    app.kubernetes.io/name: claude
spec:
  serviceName: claude
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: claude
  template:
    metadata:
      labels:
        app.kubernetes.io/name: claude
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-rootfs
          image: ubuntu:24.04
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              if [ -f /rootfs/etc/os-release ]; then
                echo "Root filesystem already initialized, skipping."
                exit 0
              fi
              echo "Initializing root filesystem..."
              apt-get update
              apt-get install -y openssh-server rsync
              rsync -a --exclude='/rootfs' --exclude='/proc' --exclude='/sys' --exclude='/dev' --exclude='/run' / /rootfs/
              mkdir -p /rootfs/proc /rootfs/sys /rootfs/dev /rootfs/run /rootfs/tmp
              mkdir -p /rootfs/run/sshd
              sed -i 's/^#*PermitRootLogin.*/PermitRootLogin yes/' /rootfs/etc/ssh/sshd_config
              echo "Root filesystem initialized."
          volumeMounts:
            - name: rootfs
              mountPath: /rootfs
          securityContext:
            runAsUser: 0
      containers:
        - name: claude
          image: ubuntu:24.04
          command: ["/usr/sbin/sshd", "-D"]
          ports:
            - name: ssh
              containerPort: 22
          volumeMounts:
            - name: rootfs
              mountPath: /
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 4Gi
          startupProbe:
            tcpSocket:
              port: ssh
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: ssh
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: ssh
            timeoutSeconds: 5
          securityContext:
            runAsUser: 0
  volumeClaimTemplates:
    - metadata:
        name: rootfs
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: ceph-block
        resources:
          requests:
            storage: 32Gi
