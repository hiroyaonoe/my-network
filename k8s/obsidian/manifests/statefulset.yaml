apiVersion: v1
kind: Service
metadata:
  name: obsidian
  namespace: obsidian
  labels:
    app.kubernetes.io/name: obsidian
spec:
  clusterIP: None
  ports:
    - port: 8443
      targetPort: ui-https
      name: ui-https
    - port: 3443
      targetPort: mcp-https
      name: mcp-https
    - port: 3001
      targetPort: mcp-http
      name: mcp-http
  selector:
    app.kubernetes.io/name: obsidian
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: obsidian
  namespace: obsidian
  labels:
    app.kubernetes.io/name: obsidian
spec:
  serviceName: obsidian
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: obsidian
  template:
    metadata:
      labels:
        app.kubernetes.io/name: obsidian
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: git-clone
          image: alpine/git:latest
          env:
            - name: GITHUB_PAT
              valueFrom:
                secretKeyRef:
                  name: obsidian-secrets
                  key: github-pat
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ -d /vaults/obsidian-private/.git ]; then
                cd /vaults/obsidian-private
                git config --local url."https://${GITHUB_PAT}@github.com/".insteadOf "https://github.com/"
                git pull --ff-only || true
              else
                git clone "https://${GITHUB_PAT}@github.com/hiroyaonoe/obsidian-private.git" /vaults/obsidian-private
              fi
              cd /vaults/obsidian-private
              git config user.name "obsidian-remote"
              git config user.email "obsidian@internal.onoe.dev"
          volumeMounts:
            - name: vaults
              mountPath: /vaults
      containers:
        - name: obsidian
          image: ghcr.io/hiroyaonoe/obsidian:latest
          ports:
            - name: ui-https
              containerPort: 8443
            - name: mcp-https
              containerPort: 3443
            - name: mcp-http
              containerPort: 3001
          env:
            - name: TZ
              value: "Asia/Tokyo"
          volumeMounts:
            - name: vaults
              mountPath: /vaults
            - name: config
              mountPath: /config
            - name: tls
              mountPath: /config/ssl/cert.pem
              subPath: tls.crt
              readOnly: true
            - name: tls
              mountPath: /config/ssl/key.pem
              subPath: tls.key
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 4Gi
          startupProbe:
            httpGet:
              path: /
              port: ui-https
              scheme: HTTPS
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /
              port: ui-https
              scheme: HTTPS
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: ui-https
              scheme: HTTPS
            timeoutSeconds: 5
      volumes:
        - name: tls
          secret:
            secretName: obsidian-tls
  volumeClaimTemplates:
    - metadata:
        name: vaults
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: ceph-block
        resources:
          requests:
            storage: 8Gi
    - metadata:
        name: config
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: ceph-block
        resources:
          requests:
            storage: 2Gi
